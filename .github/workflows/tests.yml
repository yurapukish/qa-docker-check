name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t qa-api-tests .

      - name: Run tests
        run: |
          mkdir -p reports
          docker run --rm \
            -v ${{ github.workspace }}/reports:/app/reports \
            qa-api-tests

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/report.html
